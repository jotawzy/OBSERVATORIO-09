<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Observatório 9</title>

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

    <!-- Pixelart Icons -->
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/computador.css">

</head>

<body>

    <div id="tela-computador">

        <!-- Barra superior -->
        <header id="barra-superior">

            <span id="nome-sistema">
                OBSERVATÓRIO OS v2.1
            </span>

        </header>


        <!-- Desktop -->
        <main id="desktop">
            
        <!-- ÁREA DAS JANELAS -->
        <div id="area-janelas"></div>
    
        <!-- Email -->
        <button class="icone-app" id="app-emails">
            <iconify-icon icon="pixelarticons:mail"></iconify-icon>
            <span>E-mails</span>
        </button>
        
        <!-- Arquivos -->
        <button class="icone-app" id="app-arquivos">
            <iconify-icon icon="pixelarticons:folder"></iconify-icon>
            <span>Arquivos</span>
        </button>
        
        <!-- Solicitacções -->
        <button class="icone-app" id="app-solicitacoes">
            <iconify-icon icon="pixelarticons:radio-signal"></iconify-icon>
            <span>Solicitações</span>
        </button>
        
        <!-- Quadro -->
        <button class="icone-app" id="app-quadro">
            <iconify-icon icon="pixelarticons:link"></iconify-icon>
            <span>Quadro</span>
        </button>
        
        <button class="icone-app" id="app-registros">
            <iconify-icon icon="pixelarticons:book"></iconify-icon>
            <span>Registros</span>
        </button>

        </main>


        <!-- Barra inferior -->
        <footer id="barra-inferior">

    <div id="taskbar-apps"></div>

    <div id="info-sistema">
        <span>29/02/20??</span>
        <span>21:34</span>
    </div>

        </footer>
    </div>
    
<!-- Scripts -->
<script type="module" src="js/ui.js"></script>
<script type="module" src="js/core/state.js"></script>
<script type="module" src="js/database/emails.js"></script> 
</body>
</html>
